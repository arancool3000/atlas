<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Atlas logo">
  <defs>
    <linearGradient id="atlasGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A208E"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#18C8E6"/>
    </linearGradient>
    <radialGradient id="atlasGloss" cx="0.32" cy="0.08" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="atlasSquircle"><rect x="0" y="0" width="100" height="100" rx="23.5"/></clipPath>
  </defs>
  <g clip-path="url(#atlasSquircle)">
    <rect x="0" y="0" width="100" height="100" fill="url(#atlasGrad)"/>
    <rect x="0" y="0" width="100" height="100" fill="url(#atlasGloss)"/>
    <!-- orbital ring (the 'holds the world' nod) -->
    <g transform="rotate(-20 50 52)">
      <ellipse cx="50" cy="52" rx="40" ry="16.5" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="0.9"/>
      <ellipse cx="50" cy="52" rx="40" ry="16.5" fill="none" stroke="#7df0ff" stroke-opacity="0.92"
               stroke-width="1.5" stroke-linecap="round" stroke-dasharray="52 230" stroke-dashoffset="16"/>
    </g>
    <!-- geometric A: outer triangle with inner cut-out (evenodd) + crossbar -->
    <path fill="#ffffff" fill-rule="evenodd"
          d="M50 25.5 L70.5 74.5 L29.5 74.5 Z M50 36.66 L63.3 74.5 L36.7 74.5 Z"/>
    <rect fill="#ffffff" x="42.56" y="54.53" width="14.88" height="6.62"/>
  </g>
  <rect x="0.7" y="0.7" width="98.6" height="98.6" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.20" stroke-width="0.9"/>
</svg>
