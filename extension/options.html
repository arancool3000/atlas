<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 15px -apple-system, Segoe UI, sans-serif; background:#0e0f13; color:#e9eaf0;
           max-width: 520px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 20px; }
    label { display:block; margin: 16px 0 6px; font-weight:600; }
    input { width:100%; box-sizing:border-box; padding:10px; border-radius:8px;
            border:1px solid #2a2d39; background:#181a22; color:#fff; }
    button { margin-top:16px; padding:10px 18px; border:none; border-radius:8px;
             background:#e2562a; color:#fff; font-weight:700; cursor:pointer; }
    .ok { color:#5fd07a; margin-left:10px; }
    a { color:#7aa2ff; }
    .hint { color:#8a8f98; font-size:13px; }
  </style>
</head>
<body>
  <h1>✨ Ember extension settings</h1>
  <p class="hint">Get a free Gemini API key at
    <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>.
    It's stored only in your browser and used to call Gemini directly.</p>
  <label>Gemini API key</label>
  <input id="key" type="password" placeholder="AIza…">
  <label>Model (optional)</label>
  <input id="model" placeholder="gemini-3.1-flash-lite">
  <div><button id="save">Save</button><span class="ok" id="ok"></span></div>
  <script src="options.js"></script>
</body>
</html>
